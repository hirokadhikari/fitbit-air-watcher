name: Fitbit Air India watcher

on:
  workflow_dispatch:
    inputs:
      test:
        description: "Send a test alert and exit"
        type: boolean
        default: false
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

concurrency:
  group: fitbit-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Run check
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TEST: ${{ inputs.test }}
        run: python check_fitbit.py
      - name: Persist state
        run: |
          if [ -n "$(git status --porcelain state.json)" ]; then
            git config user.name "fitbit-watcher"
            git config user.email "actions@users.noreply.github.com"
            git add state.json
            git commit -m "update state [skip ci]"
            git push
          else
            echo "no state change"
          fi
